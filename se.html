<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warp Sim - Gacha</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: {
            'spin-slow': 'spin 3s linear infinite',
          }
        }
      }
    }
  </script>
  <style>
    /* Базовые стили для плавной анимации появления (аналог animate-in) */
    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes zoom-in-bottom {
      from { opacity: 0; transform: scale(0.95) translateY(1rem); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .animate-fade-in {
      animation: fade-in 0.3s ease-out forwards;
    }
    .animate-zoom-in {
      animation: zoom-in-bottom 0.5s ease-out both;
    }
    /* Скроллбар в стиле игры */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0c1017; }
    ::-webkit-scrollbar-thumb { background: #1b263b; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #fbbf24; }
  </style>
</head>
<body class="min-h-[100dvh] bg-[#0c1017] text-[#ece5d8] font-sans antialiased relative overflow-x-hidden selection:bg-amber-500/30 flex flex-col">

  <!-- Фоновые эффекты -->
  <div class="fixed inset-0 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-[#1b263b] via-[#0c1017] to-[#080b10] pointer-events-none z-0"></div>

  <!-- ШАПКА -->
  <header class="relative z-10 w-full px-4 py-3 md:py-4 flex justify-between items-center border-b border-white/5 bg-slate-950/40 backdrop-blur-md">
    <div class="flex items-center gap-2">
      <div class="w-1.5 h-4 md:h-5 bg-amber-400 rounded-full shadow-[0_0_8px_#fbbf24]"></div>
      <h1 class="text-sm md:text-xl font-black uppercase tracking-widest text-[#fffbf4]">Warp Sim</h1>
    </div>
    
    <div class="flex items-center bg-[#161f2e] border border-white/10 rounded-full pr-1 pl-2 md:pl-3 py-1 shadow-inner">
      <span class="text-amber-400 mr-1 md:mr-2 text-xs md:text-base">✦</span>
      <span id="ui-crystals" class="font-mono font-bold text-[#f4efe6] pr-2 md:pr-4 text-xs md:text-base">16,000</span>
      <button id="btn-cheat" class="bg-amber-400 hover:bg-amber-300 text-slate-950 rounded-full w-5 h-5 md:w-6 md:h-6 flex items-center justify-center font-black transition active:scale-90 text-xs md:text-base">
        +
      </button>
    </div>
  </header>

  <!-- НАВИГАЦИЯ -->
  <nav class="relative z-10 flex justify-center w-full px-4 mt-4 mb-2">
    <div class="bg-[#111722]/80 backdrop-blur-sm p-1 rounded-xl border border-white/5 w-full max-w-sm flex gap-1 shadow-lg">
      <button id="tab-gacha" class="flex-1 text-center py-2 rounded-lg text-[10px] md:text-xs font-bold uppercase tracking-widest transition-all bg-[#ece5d8] text-slate-900 shadow-md">
        Призыв
      </button>
      <button id="tab-inventory" class="flex-1 text-center py-2 rounded-lg text-[10px] md:text-xs font-bold uppercase tracking-widest transition-all flex items-center justify-center gap-1.5 text-slate-400 hover:text-white">
        Архив
        <span id="ui-inventory-count" class="px-1 py-0.5 text-[8px] font-mono rounded bg-slate-800 text-slate-300">0</span>
      </button>
    </div>
  </nav>

  <!-- ОСНОВНОЙ КОНТЕНТ -->
  <main class="relative z-10 flex-1 w-full max-w-6xl mx-auto px-4 pb-8 flex flex-col mt-2">
    
    <!-- Вкладка: Гача -->
    <div id="view-gacha" class="flex flex-col items-center gap-4 w-full flex-1 justify-center max-w-3xl mx-auto">
      
      <!-- Трекеры Гаранта (Pity) -->
      <div class="w-full grid grid-cols-2 gap-2 md:gap-4">
        <!-- Гарант S -->
        <div class="bg-[#121824]/80 border border-white/5 rounded-xl p-2 md:p-3 flex flex-col gap-1.5 backdrop-blur-md">
          <div class="flex justify-between items-center">
            <span class="text-[9px] md:text-xs uppercase tracking-wider text-slate-400">Гарант [S]</span>
            <span id="ui-s-pity-text" class="text-[10px] md:text-xs font-mono text-amber-400">50</span>
          </div>
          <div class="w-full bg-slate-950 rounded-full h-1 overflow-hidden">
            <div id="ui-s-pity-bar" class="bg-amber-500 h-full transition-all duration-300" style="width: 0%"></div>
          </div>
        </div>
        
        <!-- Гарант EX -->
        <div id="ui-ex-pity-container" class="border rounded-xl p-2 md:p-3 flex flex-col gap-1.5 backdrop-blur-md transition-all bg-[#121824]/80 border-white/5">
          <div class="flex justify-between items-center">
            <span id="ui-ex-pity-label" class="text-[9px] md:text-xs uppercase tracking-wider truncate mr-1 text-slate-400">
              Гарант [EX]
            </span>
            <span id="ui-ex-pity-text" class="text-[10px] md:text-xs font-mono text-purple-400">90</span>
          </div>
          <div class="w-full bg-slate-950 rounded-full h-1 overflow-hidden">
            <div id="ui-ex-pity-bar" class="h-full transition-all duration-300 bg-gradient-to-r from-purple-500 to-cyan-400" style="width: 0%"></div>
          </div>
        </div>
      </div>

      <!-- Баннер -->
      <div class="w-full bg-[#121722]/90 rounded-2xl md:rounded-3xl border border-white/5 shadow-2xl relative overflow-hidden flex-1 min-h-[260px] md:min-h-[340px] flex flex-col justify-between">
        <div class="absolute inset-0 bg-gradient-to-tr from-[#16222f]/50 via-transparent to-[#111722]/80 z-0"></div>
        
        <div class="relative z-10 p-4 md:p-8 flex flex-col items-center text-center flex-1 justify-center">
          <div id="ui-banner-status" class="inline-block px-2 py-0.5 bg-amber-500/10 border border-amber-500/20 rounded-full text-[8px] md:text-[10px] uppercase font-bold text-amber-400 mb-2 md:mb-4">
            Стандартный цикл вероятности
          </div>
          <h2 class="text-xl md:text-3xl font-black text-[#fffbf4] uppercase tracking-wide drop-shadow-md mb-2">
            Сигнальный прыжок
          </h2>
          <p class="text-slate-400 text-[10px] md:text-xs max-w-xs leading-relaxed hidden sm:block">
            Протокол поиска. Аномалия S+ активирует 100% гарант для кода EX в следующем цикле.
          </p>
        </div>

        <!-- Кнопки Круток -->
        <div class="relative z-10 flex gap-2 md:gap-4 p-4 md:p-6 w-full justify-center bg-black/20 backdrop-blur-sm border-t border-white/5">
          <button id="btn-pull-1" class="flex-1 max-w-[160px] bg-slate-800/80 border border-white/10 hover:bg-slate-700 text-[#ece5d8] disabled:opacity-50 py-2.5 md:py-3 px-2 md:px-4 rounded-xl shadow-lg active:scale-95 transition-all text-[10px] md:text-xs flex flex-col items-center">
            <span class="font-bold uppercase mb-0.5">x1 Прыжок</span>
            <span class="font-mono text-amber-400 opacity-80">160 ✦</span>
          </button>
          <button id="btn-pull-10" class="flex-1 max-w-[160px] bg-[#ece5d8] hover:bg-[#fffbf4] disabled:bg-slate-700 disabled:text-slate-500 text-slate-950 py-2.5 md:py-3 px-2 md:px-4 rounded-xl shadow-xl active:scale-95 transition-all text-[10px] md:text-xs flex flex-col items-center border border-transparent">
            <span class="font-black uppercase mb-0.5">x10 Прыжок</span>
            <span class="font-mono font-bold opacity-80">1600 ✦</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Вкладка: Инвентарь -->
    <div id="view-inventory" class="w-full hidden">
      <div id="inventory-empty" class="text-center py-12 md:py-20 bg-[#121722]/40 rounded-2xl border border-white/5 border-dashed">
        <p class="text-slate-400 text-xs md:text-sm mb-4">База данных пуста.</p>
      </div>
      <div id="inventory-grid" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 gap-2 md:gap-3 lg:gap-4 hidden">
        <!-- Карты добавляются сюда скриптом -->
      </div>
    </div>
  </main>

  <!-- Оверлей результата крутки -->
  <div id="modal-result" class="fixed inset-0 z-50 bg-[#06080c]/98 flex flex-col items-center justify-between py-10 px-4 animate-fade-in hidden">
    <h2 class="text-[10px] md:text-xs font-black tracking-[0.2em] md:tracking-[0.3em] uppercase text-slate-400 border-b border-white/10 pb-2 z-10 w-full text-center mt-4">
      Результат сканирования
    </h2>
    
    <div class="w-full max-w-2xl flex-1 flex items-center justify-center">
      <div id="result-grid" class="grid gap-2 sm:gap-3 md:gap-4 w-full px-2">
        <!-- Карты результата добавляются сюда -->
      </div>
    </div>

    <button id="btn-close-result" class="z-10 bg-[#ece5d8] text-slate-950 font-black py-3 px-12 md:px-16 rounded-xl shadow-2xl active:scale-95 transition text-xs uppercase tracking-widest w-full max-w-[280px] mb-4 md:mb-0 hover:bg-[#fffbf4]">
      Подтвердить
    </button>
  </div>

  <!-- Оверлей загрузки -->
  <div id="modal-loading" class="fixed inset-0 z-50 bg-[#06080c]/80 flex items-center justify-center backdrop-blur-sm hidden">
    <div class="w-10 h-10 border-2 border-amber-400/20 border-t-amber-400 rounded-full animate-spin"></div>
  </div>

  <script>
    // --- ДАННЫЕ И НАСТРОЙКИ ---
    const RANKS = [
      { id: 'EX', name: 'EX', stars: 6, color: 'from-[#ff4554] via-[#ffae34] to-[#7000ff]', text: 'text-[#ffffff] drop-shadow-[0_0_10px_rgba(255,174,52,0.8)] animate-pulse' },
      { id: 'SSS', name: 'SSS', stars: 5, color: 'from-[#ff9c00] to-[#3a1c00]', text: 'text-[#ffebc2] drop-shadow-[0_0_6px_rgba(255,156,0,0.6)]' },
      { id: 'SS', name: 'SS', stars: 5, color: 'from-[#e67e22] to-[#2e1a0c]', text: 'text-[#fdebd0]' },
      { id: 'S_PLUS', name: 'S+', stars: 5, color: 'from-[#cca43b] via-[#5c1d1d] to-[#1f1212]', text: 'text-[#ff9494] drop-shadow-[0_0_5px_rgba(239,68,68,0.7)]' }, 
      { id: 'S', name: 'S', stars: 5, color: 'from-[#f1c40f] to-[#342803]', text: 'text-[#fef9e7]' },
      { id: 'A', name: 'A', stars: 4, color: 'from-[#af7ac5] to-[#211427]', text: 'text-[#f5eeeb]' },
      { id: 'B', name: 'B', stars: 3, color: 'from-[#5499c7] to-[#121f2c]', text: 'text-[#ebf5fb]' },
      { id: 'C', name: 'C', stars: 3, color: 'from-[#48c9b0] to-[#0e2420]', text: 'text-[#e8f8f5]' },
      { id: 'D', name: 'D', stars: 2, color: 'from-[#52be80] to-[#112519]', text: 'text-[#eafaf1]' },
      { id: 'E', name: 'E', stars: 2, color: 'from-[#a6acaf] to-[#222526]', text: 'text-[#f2f4f4]' },
      { id: 'F', name: 'F', stars: 1, color: 'from-[#797d7f] to-[#17191a]', text: 'text-[#eaecee]' }
    ];

    const PULL_COST = 160;
    const S_PITY_LIMIT = 50;
    const EX_PITY_LIMIT = 90;

    // --- СОСТОЯНИЕ (STATE) ---
    let crystals = 16000;
    let inventory = [];
    let sPityCounter = 0;
    let exPityCounter = 0;
    let guaranteedExNext = false;
    let activeTab = 'gacha'; // 'gacha' | 'inventory'

    // --- ДОМ-ЭЛЕМЕНТЫ ---
    const elCrystals = document.getElementById('ui-crystals');
    const elInvCount = document.getElementById('ui-inventory-count');
    
    // Вкладки
    const tabGachaBtn = document.getElementById('tab-gacha');
    const tabInvBtn = document.getElementById('tab-inventory');
    const viewGacha = document.getElementById('view-gacha');
    const viewInventory = document.getElementById('view-inventory');
    
    // Гарант UI
    const sPityText = document.getElementById('ui-s-pity-text');
    const sPityBar = document.getElementById('ui-s-pity-bar');
    const exPityCont = document.getElementById('ui-ex-pity-container');
    const exPityLabel = document.getElementById('ui-ex-pity-label');
    const exPityText = document.getElementById('ui-ex-pity-text');
    const exPityBar = document.getElementById('ui-ex-pity-bar');
    const bannerStatus = document.getElementById('ui-banner-status');

    // Кнопки и модалки
    const btnPull1 = document.getElementById('btn-pull-1');
    const btnPull10 = document.getElementById('btn-pull-10');
    const btnCheat = document.getElementById('btn-cheat');
    const modalLoading = document.getElementById('modal-loading');
    const modalResult = document.getElementById('modal-result');
    const resultGrid = document.getElementById('result-grid');
    const btnCloseResult = document.getElementById('btn-close-result');
    
    // Инвентарь UI
    const invEmpty = document.getElementById('inventory-empty');
    const invGrid = document.getElementById('inventory-grid');

    // --- ЛОГИКА ---

    // Генерация HTML карточки
    function generateCardHTML(card, delayMs = 0) {
      const isScam = card.rank.id === 'S_PLUS';
      const starsHTML = Array(card.rank.stars).fill('<span class="drop-shadow-[0_0_2px_#ffcc00]">✦</span>').join('');
      const animationStyle = delayMs > 0 ? `style="animation-delay: ${delayMs}ms;"` : '';
      const animClass = delayMs > 0 ? 'animate-zoom-in' : '';

      return `
        <div class="w-full max-w-[110px] sm:max-w-[140px] mx-auto ${animClass}" ${animationStyle}>
          <div class="relative aspect-[2/3] rounded-tl-none rounded-br-2xl rounded-tr-xl rounded-bl-xl overflow-hidden border border-white/10 bg-gradient-to-b ${card.rank.color} flex flex-col justify-between p-1.5 md:p-2 shadow-lg group transition-transform duration-300 hover:-translate-y-1 hover:shadow-2xl hover:border-white/30 w-full">
            <div class="absolute inset-0 bg-[linear-gradient(rgba(255,255,255,0.03)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.03)_1px,transparent_1px)] bg-[size:8px_8px] pointer-events-none"></div>
            ${isScam ? '<div class="absolute inset-0 bg-red-950/40 mix-blend-color-burn animate-pulse z-0"></div>' : ''}
            <div class="flex justify-between items-start z-10">
              <div class="px-1.5 py-0.5 text-[10px] md:text-xs font-black tracking-widest rounded bg-black/40 backdrop-blur-md ${card.rank.text}">
                ${card.rank.name}
              </div>
            </div>
            <div class="w-full bg-slate-950/70 border border-white/5 backdrop-blur-md rounded-lg md:rounded-xl p-1 z-10 space-y-0.5 flex flex-col items-center">
              <div class="flex flex-wrap justify-center gap-[1px] text-[#ffcc00] text-[8px] md:text-[10px]">
                ${starsHTML}
              </div>
              <p class="text-[#ece5d8] text-[9px] md:text-[11px] font-medium text-center truncate tracking-tight w-full px-0.5">
                ${card.name}
              </p>
            </div>
          </div>
        </div>
      `;
    }

    // Обновление общего UI
    function updateUI() {
      elCrystals.innerText = crystals.toLocaleString();
      elInvCount.innerText = inventory.length;

      // Обновление кнопок круток
      btnPull1.disabled = crystals < PULL_COST;
      btnPull10.disabled = crystals < PULL_COST * 10;

      // Обновление гаранта S
      sPityText.innerText = S_PITY_LIMIT - sPityCounter;
      sPityBar.style.width = `${(sPityCounter / S_PITY_LIMIT) * 100}%`;

      // Обновление гаранта EX
      exPityText.innerText = EX_PITY_LIMIT - exPityCounter;
      exPityBar.style.width = `${(exPityCounter / EX_PITY_LIMIT) * 100}%`;
      
      if (guaranteedExNext) {
        exPityCont.className = "border rounded-xl p-2 md:p-3 flex flex-col gap-1.5 backdrop-blur-md transition-all bg-amber-500/10 border-amber-500/40";
        exPityLabel.className = "text-[9px] md:text-xs uppercase tracking-wider truncate mr-1 text-amber-400";
        exPityLabel.innerText = "100% EX Гарант";
        exPityText.className = "text-[10px] md:text-xs font-mono text-amber-400";
        exPityBar.className = "h-full transition-all duration-300 bg-amber-400 shadow-[0_0_8px_#fbbf24]";
        bannerStatus.innerText = "Активен протокол абсолютной редкости";
      } else {
        exPityCont.className = "border rounded-xl p-2 md:p-3 flex flex-col gap-1.5 backdrop-blur-md transition-all bg-[#121824]/80 border-white/5";
        exPityLabel.className = "text-[9px] md:text-xs uppercase tracking-wider truncate mr-1 text-slate-400";
        exPityLabel.innerText = "Гарант [EX]";
        exPityText.className = "text-[10px] md:text-xs font-mono text-purple-400";
        exPityBar.className = "h-full transition-all duration-300 bg-gradient-to-r from-purple-500 to-cyan-400";
        bannerStatus.innerText = "Стандартный цикл вероятности";
      }
    }

    // Переключение вкладок
    function switchTab(tab) {
      activeTab = tab;
      
      if (tab === 'gacha') {
        tabGachaBtn.className = "flex-1 text-center py-2 rounded-lg text-[10px] md:text-xs font-bold uppercase tracking-widest transition-all bg-[#ece5d8] text-slate-900 shadow-md";
        tabInvBtn.className = "flex-1 text-center py-2 rounded-lg text-[10px] md:text-xs font-bold uppercase tracking-widest transition-all flex items-center justify-center gap-1.5 text-slate-400 hover:text-white";
        elInvCount.className = "px-1 py-0.5 text-[8px] font-mono rounded bg-slate-800 text-slate-300";
        
        viewGacha.classList.remove('hidden');
        viewInventory.classList.add('hidden');
      } else {
        tabGachaBtn.className = "flex-1 text-center py-2 rounded-lg text-[10px] md:text-xs font-bold uppercase tracking-widest transition-all text-slate-400 hover:text-white";
        tabInvBtn.className = "flex-1 text-center py-2 rounded-lg text-[10px] md:text-xs font-bold uppercase tracking-widest transition-all flex items-center justify-center gap-1.5 bg-[#ece5d8] text-slate-900 shadow-md";
        elInvCount.className = "px-1 py-0.5 text-[8px] font-mono rounded bg-slate-900 text-white";
        
        viewGacha.classList.add('hidden');
        viewInventory.classList.remove('hidden');
        
        // Рендер инвентаря только при открытии вкладки (оптимизация)
        renderInventory();
      }
    }

    function renderInventory() {
      if (inventory.length === 0) {
        invEmpty.classList.remove('hidden');
        invGrid.classList.add('hidden');
      } else {
        invEmpty.classList.add('hidden');
        invGrid.classList.remove('hidden');
        invGrid.innerHTML = inventory.map(c => generateCardHTML(c)).join('');
      }
    }

    // Логика вытягивания одной карты
    function pullSingleCard() {
      sPityCounter++;
      exPityCounter++;
      let selectedCardRank = null;

      if (exPityCounter >= EX_PITY_LIMIT) {
        if (guaranteedExNext) {
          selectedCardRank = RANKS.find(r => r.id === 'EX');
          guaranteedExNext = false;
        } else {
          if (Math.random() < 0.5) {
            selectedCardRank = RANKS.find(r => r.id === 'EX');
            guaranteedExNext = false;
          } else {
            selectedCardRank = RANKS.find(r => r.id === 'S_PLUS');
            guaranteedExNext = true;
          }
        }
        exPityCounter = 0; 
        sPityCounter = 0;  
      } 
      else if (sPityCounter >= S_PITY_LIMIT) {
        selectedCardRank = RANKS.find(r => r.id === 'S');
        sPityCounter = 0;
      } 
      else {
        const rand = Math.random() * 100;
        let cumulativeChance = 0;
        
        for (const rank of RANKS) {
          if (rank.id === 'S_PLUS') continue;
          
          let chance = rank.chance || (rank.id === 'EX' ? 0.1 : rank.id === 'SSS' ? 0.4 : rank.id === 'SS' ? 1.0 : rank.id === 'S' ? 2.5 : rank.id === 'A' ? 6.0 : rank.id === 'B' ? 10.0 : rank.id === 'C' ? 15.0 : rank.id === 'D' ? 20.0 : rank.id === 'E' ? 20.0 : 25.0);
          
          cumulativeChance += chance;
          if (rand <= cumulativeChance) {
            selectedCardRank = rank;
            break;
          }
        }
        if (!selectedCardRank) selectedCardRank = RANKS[RANKS.length - 1];

        if (selectedCardRank.id === 'EX') {
          exPityCounter = 0;
          sPityCounter = 0;
          guaranteedExNext = false;
        } else {
          const rankIndex = RANKS.findIndex(r => r.id === selectedCardRank.id);
          const sIndex = RANKS.findIndex(r => r.id === 'S');
          if (rankIndex <= sIndex) {
             sPityCounter = 0;
          }
        }
      }

      return {
        id: Math.random().toString(36).substr(2, 9) + Date.now(),
        rank: selectedCardRank,
        name: selectedCardRank.id === 'S_PLUS' ? 'Сломанное Наследие' : `Сигнатура ${selectedCardRank.name}`,
      };
    }

    // Процесс призыва
    function handlePull(amount) {
      const totalCost = PULL_COST * amount;
      if (crystals < totalCost) return;

      crystals -= totalCost;
      updateUI();
      
      modalLoading.classList.remove('hidden');

      setTimeout(() => {
        const newCards = [];
        for (let i = 0; i < amount; i++) {
          newCards.push(pullSingleCard());
        }

        // Сортировка по редкости
        newCards.sort((a, b) => RANKS.findIndex(r => r.id === a.rank.id) - RANKS.findIndex(r => r.id === b.rank.id));

        // Добавляем в начало инвентаря
        inventory = [...newCards, ...inventory];
        
        updateUI();

        // Показываем результат
        modalLoading.classList.add('hidden');
        showResultModal(newCards);

      }, 400); // Имитация задержки
    }

    function showResultModal(cards) {
      // Настраиваем сетку в зависимости от кол-ва карт
      resultGrid.className = `grid gap-2 sm:gap-3 md:gap-4 w-full px-2 ${cards.length === 1 ? 'grid-cols-1 max-w-[200px]' : 'grid-cols-3 sm:grid-cols-4 md:grid-cols-5'}`;
      
      // Генерируем HTML карточек с задержкой анимации
      resultGrid.innerHTML = cards.map((c, idx) => generateCardHTML(c, idx * 50)).join('');
      
      modalResult.classList.remove('hidden');
    }

    // --- ОБРАБОТЧИКИ СОБЫТИЙ ---
    tabGachaBtn.addEventListener('click', () => switchTab('gacha'));
    tabInvBtn.addEventListener('click', () => switchTab('inventory'));
    
    btnPull1.addEventListener('click', () => handlePull(1));
    btnPull10.addEventListener('click', () => handlePull(10));
    
    btnCheat.addEventListener('click', () => {
      crystals += 16000;
      updateUI();
    });

    btnCloseResult.addEventListener('click', () => {
      modalResult.classList.add('hidden');
      resultGrid.innerHTML = '';
      if (activeTab === 'inventory') renderInventory();
    });

    // Инициализация
    updateUI();

  </script>
</body>
</html>
