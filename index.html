<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта сайта ilyaliver.github.io</title>
    <!-- Подключаем Tailwind CSS для красивого оформления -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen py-10 px-4 sm:px-6 lg:px-8">
    
    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden">
        <div class="px-6 py-8 border-b border-gray-200 flex justify-between items-center bg-gray-50">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Страницы репозитория</h1>
                <p class="text-sm text-gray-500 mt-1">Автоматический парсинг HTML файлов из ilyaliver.github.io</p>
            </div>
            <a href="https://github.com/ilyaliver/ilyaliver.github.io" target="_blank" class="text-gray-500 hover:text-gray-900">
                <svg class="h-8 w-8" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd"></path>
                </svg>
            </a>
        </div>

        <!-- Индикатор загрузки -->
        <div id="loading" class="p-12 text-center">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-500 border-t-transparent mb-4"></div>
            <p class="text-gray-600 font-medium">Получаем данные из GitHub...</p>
            <p class="text-sm text-gray-400 mt-2">Это может занять несколько секунд, так как мы читаем код каждого файла.</p>
        </div>

        <!-- Сообщение об ошибке -->
        <div id="error" class="hidden p-6 bg-red-50 border-l-4 border-red-500 text-red-700 m-6 rounded">
            <p class="font-bold">Ошибка!</p>
            <p id="error-message"></p>
        </div>

        <!-- Таблица результатов -->
        <div class="overflow-x-auto hidden" id="table-container">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-1/2">
                            Ссылка на страницу
                        </th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-1/2">
                            Заголовок (тег &lt;title&gt;)
                        </th>
                    </tr>
                </thead>
                <tbody id="table-body" class="bg-white divide-y divide-gray-200">
                    <!-- Строки таблицы будут добавлены сюда через JavaScript -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const repoOwner = 'ilyaliver';
            const repoName = 'ilyaliver.github.io';
            const apiUrl = `https://api.github.com/repos/${repoOwner}/${repoName}/contents/`;
            const pagesBaseUrl = `https://${repoOwner}.github.io/`;

            const loadingEl = document.getElementById('loading');
            const tableContainerEl = document.getElementById('table-container');
            const tableBodyEl = document.getElementById('table-body');
            const errorEl = document.getElementById('error');
            const errorMessageEl = document.getElementById('error-message');

            try {
                // 1. Получаем список файлов в корне репозитория
                const response = await fetch(apiUrl);
                
                if (!response.ok) {
                    if (response.status === 403) {
                        throw new Error('Превышен лимит запросов к API GitHub (Rate Limit). Пожалуйста, подождите немного и обновите страницу.');
                    } else if (response.status === 404) {
                        throw new Error('Репозиторий не найден. Убедитесь, что ссылка верная и репозиторий публичный.');
                    }
                    throw new Error(`Ошибка сети: ${response.status} ${response.statusText}`);
                }

                const data = await response.json();

                // 2. Фильтруем только HTML файлы в корне
                const htmlFiles = data.filter(item => item.type === 'file' && item.name.endsWith('.html'));

                if (htmlFiles.length === 0) {
                    loadingEl.innerHTML = '<p class="text-gray-600">В корневом каталоге репозитория не найдено HTML файлов.</p>';
                    return;
                }

                // 3. Скачиваем содержимое каждого HTML файла, чтобы найти <title>
                // Используем Promise.all для параллельной загрузки
                const rowPromises = htmlFiles.map(async (file) => {
                    let pageTitle = '';
                    
                    try {
                        const fileRes = await fetch(file.download_url);
                        if (fileRes.ok) {
                            const htmlText = await fileRes.text();
                            
                            // Используем регулярное выражение для поиска тега <title>
                            // Это безопаснее и быстрее, чем парсить весь DOM (не вызывает загрузку картинок/скриптов из того HTML)
                            const titleMatch = htmlText.match(/<title[^>]*>([^<]+)<\/title>/i);
                            
                            if (titleMatch && titleMatch[1] && titleMatch[1].trim() !== '') {
                                pageTitle = titleMatch[1].trim();
                            } else {
                                pageTitle = `<span class="text-gray-400 italic">Без заголовка (файл: ${file.name})</span>`;
                            }
                        } else {
                            pageTitle = `<span class="text-red-400 italic">Не удалось прочитать файл</span>`;
                        }
                    } catch (e) {
                        console.error(`Ошибка при загрузке ${file.name}:`, e);
                        pageTitle = `<span class="text-red-400 italic">Ошибка сети при чтении</span>`;
                    }

                    const displayUrl = `${repoOwner}.github.io/${file.path}`;
                    const actualUrl = `${pagesBaseUrl}${file.path}`;

                    // Возвращаем HTML строку для строки таблицы
                    return `
                        <tr class="hover:bg-blue-50 transition-colors duration-150">
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                                <a href="${actualUrl}" target="_blank" rel="noopener noreferrer" class="text-blue-600 hover:text-blue-900 hover:underline flex items-center">
                                    ${displayUrl}
                                    <svg class="ml-1 w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                                </a>
                            </td>
                            <td class="px-6 py-4 text-sm text-gray-700">
                                ${pageTitle}
                            </td>
                        </tr>
                    `;
                });

                // Ждем завершения всех запросов
                const rowsHtml = await Promise.all(rowPromises);

                // 4. Отрисовываем таблицу
                tableBodyEl.innerHTML = rowsHtml.join('');
                
                // Скрываем загрузку, показываем таблицу
                loadingEl.classList.add('hidden');
                tableContainerEl.classList.remove('hidden');

            } catch (error) {
                console.error(error);
                loadingEl.classList.add('hidden');
                errorMessageEl.textContent = error.message;
                errorEl.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
